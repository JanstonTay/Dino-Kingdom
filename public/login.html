<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dinosaur Kingdom</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar">
    <a href="index.html" class="logo">DinoKingdom</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="dinosaur.html" class="nav-link">My Dinos</a></li>
      <li><a href="dinodex.html" class="nav-link">DinoDex</a></li>
      <li><a href="shop.html" class="nav-link">Shop</a></li>
      <li><a href="inventory.html" class="nav-link">Inventory</a></li>
      <li><a href="challenges.html" class="nav-link">Challenges</a></li>
      <li><a href="login.html" class="nav-link active">Login</a></li>
    </ul>
  </nav>

  <div class="container fade-in" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="max-width: 400px; width: 100%;">
      <div class="text-center mb-4">
        <h2>Welcome Back</h2>
        <p class="text-muted">Login to manage your kingdom</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>

        <div id="message" class="mt-3 text-center" style="margin-top: 1rem;"></div>
      </form>

      <div class="text-center" style="margin-top: 1.5rem;">
        <p class="text-muted">New here? <a href="register.html" style="color: var(--primary-color);">Create Account</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/queryCmds.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
