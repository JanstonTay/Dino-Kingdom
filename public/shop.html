<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/shop.css" rel="stylesheet" />

  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#0b6b2a;">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">Dinosaur Kingdom</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="dinosaur.html">Dinosaur</a></li>
            <li class="nav-item"><a class="nav-link" href="dinodex.html">DinosaurDex</a></li>
            <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
            <li class="nav-item"><a class="nav-link" href="inventory.html">Inventory</a></li>
            <li class="nav-item"><a class="nav-link" href="challenges.html">Challenges</a></li>
          </ul>

          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item">
              <a class="btn btn-dark btn-sm" href="register.html">Register!</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="text-center mb-4">
        <h1 class="display-5 page-title">Shop</h1>
        <p class="text-muted mb-0">Buy dinosaur eggs and food.</p>
      </div>

      <!-- Global status -->
      <div id="globalAlert" class="alert d-none" role="alert"></div>

      <!-- EGGS -->
      <div class="section-head mt-4 mb-2">
        <h2 class="h4 mb-0">Eggs <span id="eggsCount" class="badge badge-soft ms-2">0</span></h2>
        <button id="refreshEggsBtn" class="btn btn-outline-dark btn-sm">Refresh</button>
      </div>
      <div id="eggsStatus" class="text-muted small mb-2"></div>
      <div id="eggsGrid" class="row g-4"></div>

      <hr class="my-5" />

      <!-- FOOD -->
      <div class="section-head mb-2">
        <h2 class="h4 mb-0">Food <span id="foodCount" class="badge badge-soft ms-2">0</span></h2>
        <button id="refreshFoodBtn" class="btn btn-outline-dark btn-sm">Refresh</button>
      </div>
      <div id="foodStatus" class="text-muted small mb-2"></div>
      <div id="foodGrid" class="row g-4"></div>
    </main>

    <!-- Bootstrap bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your fetch wrapper -->
    <script src="js/queryCmds.js"></script>
    <script src="js/shop.js"></script>

  </body>
</html>
