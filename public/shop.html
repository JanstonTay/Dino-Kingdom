<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Dinosaur Kingdom</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar">
    <a href="index.html" class="logo">DinoKingdom</a>
    <button class="navbar-toggle" id="navbarToggle">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="dinosaur.html" class="nav-link">My Dinos</a></li>
      <li><a href="dinodex.html" class="nav-link">DinoDex</a></li>
      <li><a href="shop.html" class="nav-link active">Shop</a></li>
      <li><a href="inventory.html" class="nav-link">Inventory</a></li>
      <li><a href="challenges.html" class="nav-link">Challenges</a></li>
      <li><a href="login.html" class="nav-link" id="authLink">Login</a></li>
    </ul>
  </nav>

  <main class="container fade-in">
    <div class="mb-4 text-center">
      <h2>Marketplace</h2>
      <p class="text-muted">Purchase eggs and food for your dinosaurs</p>
      <div id="userBalance" class="mt-3" style="font-size: 1.2rem; display: none;">
        Balance: <span id="pointsDisplay" style="color: var(--primary-color); font-weight: bold;">0</span> Points
      </div>
    </div>

    <div class="tabs" style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
      <button class="btn btn-outline active-tab" onclick="switchTab('eggs')" id="eggTab">Dino Eggs</button>
      <button class="btn btn-outline" onclick="switchTab('food')" id="foodTab">Food Supply</button>
    </div>

    <div id="shopGrid" class="card-grid">
      <!-- Items injected here -->
    </div>
  </main>

  <script src="js/queryCmds.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
