<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS (ONLY ONCE) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <link href="css/style.css" rel="stylesheet" />
    <link href="css/color.css" rel="stylesheet" />
    <title>Register</title>
  </head>

  <body class="bg-body-tertiary">
    <!-- NAVBAR (paste the fixed navbar here) -->
    <!-- ... -->

    <main class="min-vh-100 d-flex align-items-center py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            <div class="card shadow-sm border-0">
              <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                  <h3 class="mb-1">Create your account</h3>
                  <p class="text-body-secondary mb-0">
                    Sign up to get started
                  </p>
                </div>

                <form id="signupForm">
                  <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required />
                  </div>

                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required />
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required />
                  </div>

                  <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required />
                  </div>

                  <button type="submit" class="btn btn-primary w-100">
                    Signup
                  </button>
                </form>

                <div id="warningCard" class="card border-danger mt-3 d-none">
                  <div class="card-body text-danger">
                    <p id="warningText" class="card-text mb-0"></p>
                  </div>
                </div>

                <div class="text-center mt-4">
                  <span class="text-body-secondary">Already have an account?</span>
                  <a href="/login.html" class="ms-1">Login</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-3 bg-primary text-bg-primary text-center">
      <p class="m-0 py-0 px-4">
        Created by Mr Siah Peih Wee for Educational Purposes in Backend
        Development. Pokémon and Pokémon character names are trademarks of Nintendo.
        Artworks are from
        <a class="link-light" href="https://pokeapi.co/" target="_blank">PokeAPI</a>
      </p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
      integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
      crossorigin="anonymous"
    ></script>

    <script src="js/queryCmds.js" type="text/javascript"></script>
    <script src="js/getCurrentURL.js" type="text/javascript"></script>
    <script src="js/userNavbarToggle.js" type="text/javascript"></script>
    <script src="js/registerUser.js" type="text/javascript"></script>
  </body>
</html>
