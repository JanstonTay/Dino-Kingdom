<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Dinosaur Kingdom</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar">
    <a href="index.html" class="logo">DinoKingdom</a>
    <button class="navbar-toggle" id="navbarToggle">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="dinosaur.html" class="nav-link">My Dinos</a></li>
      <li><a href="dinodex.html" class="nav-link">DinoDex</a></li>
      <li><a href="shop.html" class="nav-link">Shop</a></li>
      <li><a href="inventory.html" class="nav-link">Inventory</a></li>
      <li><a href="challenges.html" class="nav-link">Challenges</a></li>
      <li><a href="login.html" class="nav-link">Login</a></li>
    </ul>
  </nav>

  <div class="container fade-in auth-container">
    <div class="card auth-card-wide">
      <div class="text-center mb-4">
        <h2>Create Account</h2>
        <p class="text-muted">Begin your adventure</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" required placeholder="Choose a username">
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required placeholder="Create a password"
            minlength="6">
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" required placeholder="Confirm your password">
        </div>

        <button type="submit" class="btn btn-primary btn-full">Register</button>

        <div id="message" class="mt-3 text-center"></div>
      </form>

      <div class="text-center auth-footer">
        <p class="text-muted">Already have an account? <a href="login.html" class="auth-link">Login</a></p>
      </div>
    </div>
  </div>

  <script src="js/queryCmds.js"></script>
  <script src="js/register.js"></script>
</body>

</html>
