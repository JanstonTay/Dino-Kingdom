<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinoDex - Dinosaur Kingdom</title>
    <link rel="stylesheet" href="css/dinosaurdex.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">DinoKingdom</a>
        <button class="navbar-toggle" id="navbarToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="dinosaur.html" class="nav-link">My Dinos</a></li>
            <li><a href="dinodex.html" class="nav-link active">DinoDex</a></li>
            <li><a href="shop.html" class="nav-link">Shop</a></li>
            <li><a href="inventory.html" class="nav-link">Inventory</a></li>
            <li><a href="challenges.html" class="nav-link">Challenges</a></li>
            <li><a href="login.html" class="nav-link" id="authLink">Login</a></li>
        </ul>
    </nav>

    <main class="container fade-in">
        <div class="mb-4 text-center">
            <h2>Dinosaur Dex</h2>
            <p class="text-muted">Discover all known species</p>
        </div>

        <div class="card p-4 mb-4">
            <div class="filter-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Search dinosaurs...">
                <select id="dietFilter" class="form-control filter-select">
                    <option value="">All Diets</option>
                    <option value="Carnivore">Carnivore</option>
                    <option value="Herbivore">Herbivore</option>
                    <option value="Omnivore">Omnivore</option>
                </select>
                <select id="rarityFilter" class="form-control filter-select">
                    <option value="">All Rarities</option>
                    <option value="Common">Common</option>
                    <option value="Rare">Rare</option>
                    <option value="Epic">Epic</option>
                    <option value="Legendary">Legendary</option>
                </select>
            </div>
        </div>

        <div id="dinoGrid" class="card-grid">
            <!-- Dinos will be injected here -->
        </div>
    </main>

    <script src="js/queryCmds.js"></script>
    <script src="js/dinodex.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
