<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges - Dinosaur Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">DinoKingdom</a>
        <button class="navbar-toggle" id="navbarToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="dinosaur.html" class="nav-link">My Dinos</a></li>
            <li><a href="dinodex.html" class="nav-link">DinoDex</a></li>
            <li><a href="shop.html" class="nav-link">Shop</a></li>
            <li><a href="inventory.html" class="nav-link">Inventory</a></li>
            <li><a href="challenges.html" class="nav-link active">Challenges</a></li>
            <li><a href="login.html" class="nav-link" id="authLink">Login</a></li>
        </ul>
    </nav>

    <main class="container fade-in">
        <div class="mb-4 text-center">
            <h2>Wellness Challenges</h2>
            <p class="text-muted">Stay healthy to earn rewards for your kingdom</p>
        </div>

        <div id="createChallengeSection" class="card mb-4 hidden">
            <h3>Create New Challenge</h3>
            <form id="createChallengeForm" class="mt-3">
                <div class="form-group">
                    <label for="challengeDescription" class="form-label">Challenge Description</label>
                    <input type="text" id="challengeDescription" class="form-control"
                        placeholder="e.g. Drink 2L of water daily" required>
                </div>
                <div class="form-group">
                    <label for="challengePoints" class="form-label">Points Reward</label>
                    <input type="number" id="challengePoints" class="form-control" placeholder="e.g. 50" required
                        min="10" max="1000">
                </div>
                <button type="submit" class="btn btn-primary">Create Challenge</button>
                <button type="button" id="cancelCreateBtn" class="btn btn-outline">Cancel</button>
            </form>
        </div>

        <div id="createToggleContainer" class="text-center mb-4">
            <button id="showCreateFormBtn" class="btn btn-primary">Create Your Own Challenge</button>
        </div>

        <div id="challengesGrid" class="card-grid">
            <!-- Challenges injected here -->
        </div>
    </main>

    <script src="js/queryCmds.js"></script>
    <script src="js/challenges.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
